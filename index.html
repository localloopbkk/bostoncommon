<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Street Furniture Editor</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700;800&family=Work+Sans:wght@300;400;600;800&display=swap');

    :root{
      --leftW: 320px;
      --rightW: 230px;
      --edgeGap: 14px;
      --radius: 22px;
      --glass: rgba(255,255,255,0.13);
      --glass-border: rgba(255,255,255,0.22);
      --accent: #a8edce;
      --accent2: #ffd6e0;
      --txt: #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; height: 100%;
      font-family: 'Work Sans', 'Noto Sans Thai', sans-serif;
      overflow: hidden; background: #000;
      cursor: url('color-arctic-lime-pointer.png'), auto;
    }
    button, .item-card, canvas, input, select, textarea, a {
      cursor: url('color-arctic-lime-pointer.png'), pointer !important;
    }
    body {
      background:
        linear-gradient(180deg, rgba(0,0,0,.28), rgba(0,0,0,.08)),
        url('Gemini_Generated_Image_eg5v3ceg5v3ceg5v.png') center/cover no-repeat;
    }

    /* ── CUSTOM SCROLLBAR — thin vertical pill ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.06); border-radius: 99px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.06); }
    ::-webkit-scrollbar-thumb { background: rgba(200,200,210,0.45); border-radius: 99px; min-height: 40px; transition: background .25s; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(220,220,230,0.75); }
    ::-webkit-scrollbar-thumb:active { background: rgba(255,255,255,0.85); }

    /* ── START SCREEN ── */
    #startScreen {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: url('Gemini_Generated_Image_xy1tbfxy1tbfxy1t.png') center/cover no-repeat;
      transition: opacity 0.9s ease, visibility 0.9s ease;
    }
    #startScreen.hidden { opacity:0; visibility:hidden; pointer-events:none; }
    #startScreen::before {
      content:''; position:absolute; inset:0;
      background: linear-gradient(160deg,rgba(0,0,0,.50) 0%,rgba(0,20,40,.60) 100%);
    }
    .start-content { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:24px; text-align:center; padding: 0 24px; }
    .start-logo { width:160px; filter:drop-shadow(0 4px 24px rgba(0,0,0,.6)); animation: floatLogo 3.2s ease-in-out infinite; }
    @keyframes floatLogo { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
    .start-title { font-size:30px; font-weight:800; color:#fff; line-height:1.3; text-shadow:0 2px 24px rgba(0,0,0,.5); }
    .start-sub { font-size:15px; color:rgba(255,255,255,.78); font-weight:400; }
    #btn_start {
      padding:15px 52px; border:none; border-radius:999px;
      background:linear-gradient(135deg,#a8edce 0%,#72d4f5 100%);
      color:#1a3a2e; font-size:17px; font-weight:800;
      font-family:'Work Sans', sans-serif;
      box-shadow:0 6px 36px rgba(100,220,180,.45),0 2px 8px rgba(0,0,0,.2);
      transition:transform .18s, box-shadow .18s; letter-spacing:.3px;
    }
    #btn_start:hover { transform:scale(1.07) translateY(-2px); box-shadow:0 14px 44px rgba(100,220,180,.55); }
    #btn_start:active { transform:scale(0.97); }
    .start-hint { font-size:12.5px; color:rgba(255,255,255,.48); }

    /* ── LAYOUT ── */
    #container { width:100vw; height:100vh; }
    canvas { display:block; }
    .pad-left  { padding-left:  calc(var(--leftW)  + var(--edgeGap)*2 + 4px); }
    .pad-right { padding-right: calc(var(--rightW) + var(--edgeGap)*2 + 4px); }

    /* ── SIDEBAR BASE ── */
    .sidebar {
      position:fixed; top:var(--edgeGap); bottom:var(--edgeGap);
      padding:14px 12px; display:flex; flex-direction:column; gap:8px;
      overflow-y:auto; overflow-x:hidden; z-index:9500; color:#fff;
      background:var(--glass); border:1px solid var(--glass-border);
      backdrop-filter:blur(16px) saturate(170%);
      -webkit-backdrop-filter:blur(16px) saturate(170%);
      border-radius:var(--radius);
      box-shadow:0 8px 36px rgba(0,0,0,.30), inset 0 1px 0 rgba(255,255,255,.12);
    }
    #leftbar  { left:var(--edgeGap);  width:var(--leftW); }
    #rightbar { right:var(--edgeGap); width:var(--rightW); }
    #rightbar .panel:first-of-type { margin-top:0; }

    .brand-inside { width: 100%; display: block; margin-bottom: 4px; filter: drop-shadow(0 2px 8px rgba(0,0,0,.45)); pointer-events: none; max-height: 68px; object-fit: contain; }

    /* ── HUD ── */
    .hud { position:fixed; left:30%; transform:translateX(-30%); bottom:calc(var(--edgeGap) + 6px); display:flex; gap:10px; z-index:9600; max-width:min(92vw,1200px); flex-wrap:wrap; justify-content:center; }

    /* ── GROUP TITLE ── */
    .group { display:flex; flex-direction:column; gap:4px; }
    .group-title { font-weight:700; font-size:12.5px; color:#fff; margin-top:10px; margin-bottom:3px; padding:6px 10px; border-radius:10px; background:rgba(255,255,255,.09); border-left:3px solid var(--accent); line-height:1.3; }

    /* ── ITEM GRID ── */
    .item-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
    .item-card { display:flex; flex-direction:column; align-items:center; gap:4px; padding:7px 4px 6px; border-radius:15px; font-size:10.5px; background:rgba(255,255,255,.09); color:#fff; border:1.5px solid rgba(255,255,255,.16); transition:all .15s ease; text-align:center; position:relative; overflow:hidden; }
    .item-card:hover { background:rgba(255,255,255,.19); border-color:rgba(255,255,255,.35); transform:translateY(-2px); box-shadow:0 5px 18px rgba(0,0,0,.18); }
    .item-card.active { background:linear-gradient(135deg,rgba(168,237,206,.32),rgba(114,212,245,.26)) !important; border-color:var(--accent) !important; box-shadow:0 0 0 2px rgba(168,237,206,.35),0 5px 18px rgba(0,0,0,.18); }
    .item-card .thumb { width:52px; height:52px; object-fit:contain; border-radius:10px; background:rgba(255,255,255,.05); }
    .item-card .thumb-placeholder { width:52px; height:52px; border-radius:10px; background:rgba(255,255,255,.07); display:flex; align-items:center; justify-content:center; font-size:22px; }
    .item-card .card-label { font-size:10px; line-height:1.25; word-break:break-word; opacity:.9; }
    .item-card .card-count { position:absolute; top:4px; right:5px; font-size:9.5px; font-weight:700; background:rgba(168,237,206,.88); color:#1a3a2e; border-radius:99px; padding:1px 5px; display:none; }
    .item-card .card-count.show { display:block; }
    .card-spinner { display:none; width:20px; height:20px; border:2.5px solid rgba(255,255,255,.18); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }
    @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
    .item-card.loading .thumb, .item-card.loading .thumb-placeholder { opacity:.25; }
    .item-card.loading .card-spinner { display:block; }
    .item-card.load-error { border-color:rgba(255,100,100,.45) !important; }
    .item-card.load-error .card-err { display:block !important; }
    .card-err { display:none; position:absolute; bottom:3px; left:0; right:0; text-align:center; font-size:9px; color:#ff8888; }

    /* ── CONTROLS ── */
    .panel { display:flex; flex-direction:column; gap:7px; }
    .ctrl { padding:9px 12px; border:none; border-radius:14px; color:#fff; font-size:12.5px; font-family:'Work Sans','Noto Sans Thai',sans-serif; background:rgba(255,255,255,.11); text-align:left; border:1px solid rgba(255,255,255,.18); transition:all .14s ease; text-decoration:none; display:block; font-weight:500; }
    .ctrl:hover { background:rgba(255,255,255,.20); transform:translateY(-1px); box-shadow:0 3px 12px rgba(0,0,0,.14); }
    .ctrl:active { transform:translateY(0); }
    .ctrl.delete-btn { background:rgba(255,80,80,.17); border-color:rgba(255,100,100,.32); color:#ffc8c8; }
    .ctrl.delete-btn:hover { background:rgba(255,80,80,.30); color:#fff; }
    .ctrl.accent-btn { background:linear-gradient(135deg,rgba(168,237,206,.22),rgba(114,212,245,.18)); border-color:rgba(168,237,206,.38); color:var(--accent); font-weight:700; }
    .ctrl.accent-btn:hover { background:linear-gradient(135deg,rgba(168,237,206,.34),rgba(114,212,245,.26)); }
    .ctrl.music-on { background:rgba(168,237,206,.20); border-color:rgba(168,237,206,.50); color:#a8edce; font-weight:700; }

    /* ── STATUS ── */
    .status { margin-top:2px; padding:9px 12px; border-radius:14px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12); color:#f0f0f0; font-size:12px; line-height:1.6; }

    /* ── PROP PANEL ── */
    .prop-panel { display:none; flex-direction:column; gap:7px; background:rgba(0,0,0,.16); padding:9px; border-radius:13px; border:1px solid rgba(255,255,255,.09); }
    .prop-row { display:flex; align-items:center; justify-content:space-between; font-size:12px; gap:8px; }

    /* ── SECTION HEADER ── */
    .section-hdr { font-size:10.5px; font-weight:700; letter-spacing:.7px; text-transform:uppercase; color:var(--accent); opacity:.8; padding:0 2px; margin-top:2px; }

    /* ── RANGE ── */
    input[type="range"] { -webkit-appearance:none; appearance:none; width:100%; height:4px; border-radius:99px; background:rgba(255,255,255,.16); outline:none; margin:5px 0; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:17px; height:17px; border-radius:50%; background:linear-gradient(135deg,#a8edce,#72d4f5); box-shadow:0 2px 8px rgba(0,0,0,.28); border:2px solid rgba(255,255,255,.45); cursor:pointer; transition:transform .14s; }
    input[type="range"]::-webkit-slider-thumb:hover { transform:scale(1.22); }
    input[type="range"]::-moz-range-thumb { width:17px; height:17px; border-radius:50%; background:linear-gradient(135deg,#a8edce,#72d4f5); box-shadow:0 2px 8px rgba(0,0,0,.28); border:2px solid rgba(255,255,255,.45); cursor:pointer; }

    /* ── INPUTS ── */
    input[type="color"] { border:none; width:38px; height:24px; background:none; padding:0; border-radius:8px; }
    select, input[type="number"] { border-radius:10px; border:1px solid rgba(255,255,255,.20); background:rgba(0,0,0,.20); color:#fff; padding:5px 7px; outline:none; font-family:'Work Sans','Noto Sans Thai',sans-serif; font-size:11.5px; }
    .extra-input-label { font-size:11.5px; font-weight:600; color:#fff; opacity:.82; margin-bottom:3px; }
    .extra-input { width:100%; min-height:60px; resize:vertical; border-radius:13px; border:1px solid rgba(255,255,255,.20); background:rgba(0,0,0,.16); color:#fff; padding:8px 11px; outline:none; box-sizing:border-box; font-family:'Work Sans','Noto Sans Thai',sans-serif; font-size:12px; line-height:1.4; }
    .extra-input:focus { border-color:rgba(168,237,206,.45); background:rgba(0,0,0,.24); }
    .extra-input::placeholder { color:rgba(255,255,255,.36); }
    .link-note { font-size:10.5px; opacity:.60; line-height:1.45; }

    /* ── DIVIDER ── */
    .divider { height:1px; background:rgba(255,255,255,.09); border-radius:99px; margin:1px 0; }
    .rot-row { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
    .grid-row { display:grid; grid-template-columns:1fr 1fr; gap:5px; }

    /* ── CAM PILL ── */
    .bottom-hud { position:fixed; left:50%; transform:translateX(-50%); bottom:var(--edgeGap); z-index:9700; pointer-events:none; }
    .cam-pill { display:inline-flex; align-items:center; gap:7px; padding:7px 15px; border-radius:999px; background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.17); backdrop-filter:blur(8px); color:#fff; font-weight:700; font-size:12.5px; box-shadow:0 4px 20px rgba(0,0,0,.22); }

    /* ── CLOUDS ── */
    body::after { content:''; position:fixed; left:0; right:0; bottom:0; height:180px; background:url("images/clouds.png") center bottom/cover no-repeat; z-index:9000; pointer-events:none; }
  </style>
</head>
<body>

  <div id="startScreen">
    <div class="start-content">
      <img class="start-logo" src="images/logo.png" alt="LocalLoop BKK" onerror="this.style.display='none'">
      <div class="start-title">🌿 Design Your Dream<br>Public Park</div>
      <div class="start-sub">Place furniture, add trees, and create green spaces.</div>
      <button id="btn_start">✨ Start</button>
      <div class="start-hint">Double-click on the ground to place objects.</div>
    </div>
  </div>

  <audio id="bgMusic" loop>
    <source src="https://edhwbkcmxgisqnznryhp.supabase.co/storage/v1/object/public/models/music.mp3" type="audio/mpeg">
  </audio>
  <div class="hud" id="hud"></div>

  <aside id="leftbar" class="sidebar">
    <div class="group" id="menu"></div>
  </aside>

  <aside id="rightbar" class="sidebar">
    <img class="brand-inside" src="images/logo.png" alt="LocalLoop BKK" onerror="this.style.display='none'">
    <div class="divider" style="margin-bottom:2px"></div>

    <div class="panel">
      <button class="ctrl" id="btn_music">🔇 Sound: Off</button>
      <button class="ctrl" id="btn_snap">📷 Save Screenshot</button>
      <div>
        <div class="extra-input-label">Additional Feedback</div>
        <textarea id="additionalInfo" class="extra-input" placeholder="Type your comments here..."></textarea>
      </div>
      <button class="ctrl accent-btn" id="btn_submit">✔ Submit Data</button>
      <a class="ctrl" href="gallery.html">🖼 View All Works</a>
      
      <button class="ctrl" id="btn_toggle_tree">🌳 Hide Original Trees</button>

      <button class="ctrl" id="btn_undo">⟲ Undo</button>
    </div>

    <div class="divider"></div>

    <div class="panel" id="propPanelWrapper" style="display:none">
      <div class="status" style="margin-top:0;padding:8px 11px;">
        <b>✨ Selected: <span id="selNameDisp" style="color:var(--accent)"></span></b>
      </div>
      <button class="ctrl delete-btn" id="btn_delete_sel">🗑 Delete Object</button>
      <div class="prop-panel" style="display:flex;margin-top:3px">
        <div class="prop-row"><span>🎨 Color</span><input type="color" id="objColor" value="#ffffff"></div>
        <div class="prop-row" style="margin-top:5px"><span>📏 Scale</span><input type="number" id="objScale" step="0.1" value="1.0" style="width:64px"></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="panel">
      <div class="section-hdr">⟳ Rotation</div>
      <div class="rot-row">
        <button class="ctrl" id="btn_rot_holdL" style="text-align:center;padding:8px 4px;font-size:17px">⟲</button>
        <button class="ctrl" id="btn_rot_holdR" style="text-align:center;padding:8px 4px;font-size:17px">⟳</button>
      </div>
      <input id="rotSlider" type="range" min="0" max="360" value="0" step="1"/>
      <div class="status" style="margin-top:1px;padding:7px 11px;font-size:11.5px">
        <label style="display:flex;align-items:center;gap:5px;margin-bottom:4px">
          <span>Axis:</span>
          <select id="rotAxis" style="flex:1">
            <option value="z">Left-Right (Z)</option>
            <option value="y">Up-Down (Y)</option>
            <option value="x">Tilt (X)</option>
          </select>
        </label>
        <div><b>Angle (<span id="axisLabel">Z</span>):</b> <span id="rotDeg" style="color:var(--accent)">0°</span></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="panel">
      <div class="section-hdr">⊞ Grid</div>
      <div class="grid-row">
        <button class="ctrl" id="btn_grid_minus" style="text-align:center">➖</button>
        <button class="ctrl" id="btn_grid_plus"  style="text-align:center">➕</button>
      </div>
      <button class="ctrl" id="btn_grid_random" style="font-size:11.5px">🎲 Random Grid: Off</button>
    </div>

    <div class="status" id="statusBox">
      <div>📦 <b>Total Placed:</b> <span id="totalPlaced" style="color:var(--accent);font-weight:700">0</span></div>
      <div>⊞ <b>Grid Size:</b> <span id="gridSizeLabel">20</span> Cells</div>
    </div>
  </aside>

  <div id="container" class="pad-left pad-right"></div>

  <script type="module">
    // ... (Three.js scripts remain largely the same, but you may want to update dynamic labels in the JS section too)
    // For example:
    // btnMusic.textContent = isMusicPlaying ? '🎵 Sound: On' : '🔇 Sound: Off';
    // document.getElementById('btn_toggle_tree').textContent = isTreeVisible ? '🌳 Hide Original Trees' : '🌳 Show Original Trees';
    // ...
  </script>
</body>
</html>
